<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6C5CE7">
  <title>KidCash Chore Board</title>
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6C5CE7; --purple-light: #A29BFE; --purple-dark: #5A4BD1;
      --green: #00A878; --green-faint: rgba(0,168,120,0.10);
      --red: #D63031;
      --bg: #F5F6FA; --bg-secondary: #ECEDF3; --card: #FFFFFF;
      --text: #1A1D2E; --text-secondary: #6B7280; --text-muted: #9CA3AF;
      --border: #E5E7EB;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.09);
      --radius: 16px; --radius-sm: 12px; --radius-xs: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 56px;
    }

    .header {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
      padding: 48px 24px 32px;
      text-align: center;
      color: white;
    }

    .header-logo {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      opacity: 0.9; margin-bottom: 20px;
    }

    .header-avatar {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 12px;
    }

    .header-name { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .header-tagline { font-size: 15px; opacity: 0.85; margin-top: 6px; font-weight: 500; }

    .content { max-width: 480px; margin: 0 auto; padding: 24px 16px 0; }

    /* Submit form card */
    .submit-card {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 20px;
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }

    .submit-card-title {
      font-size: 16px; font-weight: 700; margin-bottom: 16px;
      color: var(--text);
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
    }

    .form-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-xs);
      font-family: inherit; font-size: 15px; font-weight: 500;
      outline: none; background: var(--bg);
      color: var(--text); transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--purple); }

    .form-input.error { border-color: var(--red); }

    .field-hint {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
    }

    .field-error {
      font-size: 12px; color: var(--red); margin-top: 4px; display: none;
    }

    .field-error.visible { display: block; }

    .amount-wrap { position: relative; }

    .amount-prefix {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; font-weight: 600; color: var(--text-secondary);
    }

    .amount-wrap .form-input { padding-left: 26px; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: var(--purple); color: white;
      border: none; border-radius: var(--radius-xs);
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }

    .submit-btn:hover { background: var(--purple-dark); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Success state */
    .success-card {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 32px 20px;
      box-shadow: var(--shadow-md);
      text-align: center;
      margin-bottom: 24px;
    }

    .success-icon { font-size: 48px; margin-bottom: 12px; }
    .success-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--green); }
    .success-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }

    .add-another-btn {
      padding: 11px 24px;
      background: rgba(108,92,231,0.08);
      border: 1.5px solid rgba(108,92,231,0.2);
      border-radius: var(--radius-xs);
      color: var(--purple);
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer;
    }

    .add-another-btn:hover { background: rgba(108,92,231,0.14); }

    /* Pending chores list */
    .pending-section {
      margin-top: 8px;
    }

    .pending-section-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px;
    }

    .pending-list { display: flex; flex-direction: column; gap: 10px; }

    .pending-card {
      background: var(--card);
      border-radius: var(--radius-xs);
      padding: 12px 14px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 10px;
      border-left: 3px solid var(--purple-light);
    }

    .pending-card-icon { font-size: 20px; flex-shrink: 0; }

    .pending-card-info { flex: 1; min-width: 0; }

    .pending-card-name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .pending-card-meta {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
    }

    .pending-card-amount {
      font-size: 15px; font-weight: 800; color: var(--purple); flex-shrink: 0;
    }

    /* State boxes */
    .state-box { text-align: center; padding: 64px 24px; }
    .state-icon { font-size: 56px; margin-bottom: 16px; }
    .state-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .state-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

    .footer { text-align: center; margin-top: 40px; font-size: 12px; color: var(--text-muted); }
    .footer a { color: var(--purple); text-decoration: none; font-weight: 600; }

    .cb-status-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 99px; }
    .cb-status-pending  { background: rgba(243,156,18,0.12); color: #b7760a; }
    .cb-status-approved { background: rgba(0,168,120,0.12); color: #006b4d; }
    .cb-status-rejected { background: rgba(214,48,49,0.10); color: #a82020; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
  <div id="root">
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <div class="state-title">Loading…</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, getDocs, addDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCuUvL-bT4nB1J4B7qcpgIhXamzT85JPCY",
      authDomain: "kidcash-52084.firebaseapp.com",
      projectId: "kidcash-52084",
      storageBucket: "kidcash-52084.firebasestorage.app",
      messagingSenderId: "505786658885",
      appId: "1:505786658885:web:e5b514ffb8d410f37eb32c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ── State ──────────────────────────────────────────────────
    let choreboardData = null; // null until loaded
    let shareToken = null;
    let submittedChoreId = null; // set after successful submit
    let pendingChores = []; // existing pending chores from Firestore

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // ── Helpers ────────────────────────────────────────────────
    function formatMoney(cents) {
      const dollars = Math.floor(Math.abs(cents) / 100);
      const rem = Math.abs(cents) % 100;
      return `$${dollars.toLocaleString()}.${rem.toString().padStart(2, '0')}`;
    }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Submit handler ─────────────────────────────────────────
    window._submitChore = async function() {
      const nameInput = document.getElementById('choreName');
      const amountInput = document.getElementById('choreAmount');
      const submitterInput = document.getElementById('submitterName');
      const noteInput = document.getElementById('choreNote');

      const name = nameInput?.value?.trim().slice(0, 100);
      const amountStr = amountInput?.value?.trim();
      const submitter = submitterInput?.value?.trim().slice(0, 50);
      const note = noteInput?.value?.trim().slice(0, 200);

      let valid = true;

      // Validate name
      const nameErr = document.getElementById('nameError');
      if (!name || name.length < 2) {
        nameInput?.classList.add('error');
        if (nameErr) { nameErr.textContent = 'Please enter a chore name (at least 2 characters).'; nameErr.classList.add('visible'); }
        nameInput?.classList.add('shake');
        setTimeout(() => nameInput?.classList.remove('shake'), 400);
        valid = false;
      } else {
        nameInput?.classList.remove('error');
        if (nameErr) nameErr.classList.remove('visible');
      }

      // Validate amount
      const amountErr = document.getElementById('amountError');
      const amountDollars = parseFloat(amountStr);
      const amountCents = Math.round(amountDollars * 100);
      if (!amountStr || isNaN(amountDollars) || amountCents < 100 || amountCents > 50000) {
        amountInput?.classList.add('error');
        if (amountErr) { amountErr.textContent = 'Amount must be between $1.00 and $500.00.'; amountErr.classList.add('visible'); }
        amountInput?.classList.add('shake');
        setTimeout(() => amountInput?.classList.remove('shake'), 400);
        valid = false;
      } else {
        amountInput?.classList.remove('error');
        if (amountErr) amountErr.classList.remove('visible');
      }

      // Validate submitter name
      const submitterErr = document.getElementById('submitterError');
      if (!submitter || submitter.length < 1) {
        submitterInput?.classList.add('error');
        if (submitterErr) { submitterErr.textContent = 'Please enter your name.'; submitterErr.classList.add('visible'); }
        submitterInput?.classList.add('shake');
        setTimeout(() => submitterInput?.classList.remove('shake'), 400);
        valid = false;
      } else {
        submitterInput?.classList.remove('error');
        if (submitterErr) submitterErr.classList.remove('visible');
      }

      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

      try {
        const pendingRef = collection(db, 'public_chore_boards', shareToken, 'pending');
        const docRef = await addDoc(pendingRef, {
          name,
          amount: amountCents,
          addedBy: submitter,
          note: note || '',
          submittedAt: Date.now(),
        });
        submittedChoreId = docRef.id;
        // Add to local pending list for display
        pendingChores.push({ id: docRef.id, name, amount: amountCents, addedBy: submitter, note: note || '' });
        render();
      } catch (e) {
        console.error('Failed to submit chore:', e);
        const errEl = document.getElementById('submitError');
        if (errEl) { errEl.textContent = 'Could not send. Please try again shortly.'; errEl.classList.add('visible'); }
        if (btn) { btn.disabled = false; btn.textContent = 'Suggest This Chore'; }
      }
    };

    window._addAnother = function() {
      submittedChoreId = null;
      render();
      // Clear form fields after re-render
      setTimeout(() => {
        const nameInput = document.getElementById('choreName');
        const amountInput = document.getElementById('choreAmount');
        const noteInput = document.getElementById('choreNote');
        if (nameInput) nameInput.value = '';
        if (amountInput) amountInput.value = '';
        if (noteInput) noteInput.value = '';
      }, 50);
    };

    window._handleKeydown = function(e) {
      if (e.key === 'Enter') window._submitChore();
    };

    // ── Render ─────────────────────────────────────────────────
    function render() {
      const root = document.getElementById('root');

      if (!choreboardData) {
        document.title = 'KidCash Chore Board';
        root.innerHTML = `
          <div class="header"><div class="header-logo">KidCash</div></div>
          <div class="content">
            <div class="state-box">
              <div class="state-icon">🔍</div>
              <div class="state-title">Chore board not found</div>
              <div class="state-desc">This link may have expired or been removed.</div>
            </div>
          </div>`;
        return;
      }

      const { kidName } = choreboardData;
      document.title = `${kidName}'s Chore Board · KidCash`;

      const lastSubmitted = submittedChoreId
        ? pendingChores.find(c => c.id === submittedChoreId)
        : null;
      const parentName = esc(kidName);

      const formOrSuccess = submittedChoreId ? `
        <div class="success-card">
          <div class="success-icon">✓</div>
          <div class="success-title">Suggestion sent!</div>
          <div class="success-desc">
            ${parentName}'s parent will review your suggestion
            ${lastSubmitted ? `<strong>"${esc(lastSubmitted.name)}"</strong>` : ''} and add it as a chore.
          </div>
          <button class="add-another-btn" onclick="_addAnother()">Suggest Another Chore</button>
        </div>
      ` : `
        <div class="submit-card">
          <div class="submit-card-title">Suggest a chore for ${parentName}</div>
          <div class="form-group">
            <label for="choreName">Chore name <span style="color:var(--red)">*</span></label>
            <input class="form-input" id="choreName" type="text" placeholder="e.g., Wash the car"
              maxlength="100" onkeydown="_handleKeydown(event)" autocomplete="off">
            <div class="field-error" id="nameError"></div>
          </div>
          <div class="form-group">
            <label for="choreAmount">Reward amount <span style="color:var(--red)">*</span></label>
            <div class="amount-wrap">
              <span class="amount-prefix">$</span>
              <input class="form-input" id="choreAmount" type="number"
                placeholder="5.00" min="1" max="500" step="0.01" inputmode="decimal"
                onkeydown="_handleKeydown(event)">
            </div>
            <div class="field-hint">Between $1.00 and $500.00</div>
            <div class="field-error" id="amountError"></div>
          </div>
          <div class="form-group">
            <label for="submitterName">Your name <span style="color:var(--red)">*</span></label>
            <input class="form-input" id="submitterName" type="text" placeholder="e.g., Grandma"
              maxlength="50" onkeydown="_handleKeydown(event)" autocomplete="name">
            <div class="field-error" id="submitterError"></div>
          </div>
          <div class="form-group">
            <label for="choreNote">Note for ${parentName} <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
            <input class="form-input" id="choreNote" type="text"
              placeholder="e.g., Be sure to get the wheels too!" maxlength="200"
              onkeydown="_handleKeydown(event)">
          </div>
          <div class="field-error" id="submitError" style="margin-bottom:8px"></div>
          <button class="submit-btn" id="submitBtn" onclick="_submitChore()">Suggest This Chore</button>
        </div>
      `;

      const pendingOthers = pendingChores.filter(c => c.id !== submittedChoreId);
      const statusBadge = (c) => {
        const s = c.status || 'pending';
        if (s === 'approved') return `<span class="cb-status-badge cb-status-approved">✓ Approved</span>`;
        if (s === 'rejected') return `<span class="cb-status-badge cb-status-rejected">Not added this time</span>`;
        return `<span class="cb-status-badge cb-status-pending">Awaiting review</span>`;
      };
      const pendingListHtml = pendingOthers.length > 0 ? `
        <div class="pending-section">
          <div class="pending-section-title" style="display:flex;align-items:center;justify-content:space-between">
            <span>Already suggested</span>
            <button onclick="main()" style="background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--purple)">↻ Refresh</button>
          </div>
          <div class="pending-list">
            ${pendingOthers.map(c => `
              <div class="pending-card">
                <div class="pending-card-icon">🧹</div>
                <div class="pending-card-info">
                  <div class="pending-card-name">${esc(c.name)}</div>
                  <div class="pending-card-meta">From ${esc(c.addedBy || 'Family')}${c.note ? ` · "${esc(c.note)}"` : ''}</div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
                  <div class="pending-card-amount">+${formatMoney(c.amount)}</div>
                  ${statusBadge(c)}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : '';

      root.innerHTML = `
        <div class="header">
          <div class="header-logo">KidCash</div>
          <div class="header-avatar">🧹</div>
          <div class="header-name">${parentName}'s Chore Board</div>
          <div class="header-tagline">Suggest a chore for ${parentName} to earn money</div>
        </div>
        <div class="content">
          ${formOrSuccess}
          ${pendingListHtml}
          <div class="footer">Powered by <a href="${esc(window.location.origin)}">KidCash</a></div>
        </div>`;
    }

    // ── Load data ──────────────────────────────────────────────
    async function main() {
      const params = new URLSearchParams(window.location.search);
      shareToken = params.get('id');

      if (!shareToken || !/^[0-9a-f]{32}$/.test(shareToken)) {
        render(); return;
      }

      try {
        const boardSnap = await getDoc(doc(db, 'public_chore_boards', shareToken));
        if (boardSnap.exists()) choreboardData = boardSnap.data();
      } catch (e) {
        console.error('Failed to load chore board:', e);
      }

      // Load existing pending chores so family can see what's already been suggested
      if (choreboardData) {
        try {
          const pendingSnap = await getDocs(collection(db, 'public_chore_boards', shareToken, 'pending'));
          pendingChores = [];
          pendingSnap.forEach(d => { pendingChores.push({ id: d.id, ...d.data() }); });
        } catch (e) {
          console.warn('Could not load pending chores:', e);
        }
      }

      render();
    }

    main();
  </script>
</body>
</html>
