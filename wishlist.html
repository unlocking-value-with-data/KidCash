<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6C5CE7">
  <title>KidCash Wishlist</title>
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6C5CE7;
      --purple-light: #7B6CF0;
      --bg: #F8F9FD;
      --bg-secondary: #FFFFFF;
      --text: #1A1A2E;
      --text-secondary: #666680;
      --text-muted: #999AB0;
      --border: #E8E8F0;
      --green: #00B894;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 4px 24px rgba(108,92,231,0.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 48px;
    }

    .header {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
      padding: 48px 24px 32px;
      text-align: center;
      color: white;
    }

    .header-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .header-avatar {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 12px;
    }

    .header-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header-tagline {
      font-size: 15px;
      opacity: 0.85;
      margin-top: 6px;
      font-weight: 500;
    }

    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 0;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .item-image {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .item-image-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #f0eeff 0%, #e8e4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-price {
      font-size: 18px;
      font-weight: 800;
      color: var(--purple);
    }

    .item-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
    }

    .item-link:hover { background: var(--bg); }

    .state-box {
      text-align: center;
      padding: 64px 24px;
    }

    .state-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .state-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .state-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--purple);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <div class="state-title">Loading wishlist…</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCuUvL-bT4nB1J4B7qcpgIhXamzT85JPCY",
      authDomain: "kidcash-52084.firebaseapp.com",
      projectId: "kidcash-52084",
      storageBucket: "kidcash-52084.firebasestorage.app",
      messagingSenderId: "505786658885",
      appId: "1:505786658885:web:e5b514ffb8d410f37eb32c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function formatMoney(cents) {
      const dollars = Math.floor(Math.abs(cents) / 100);
      const remaining = Math.abs(cents) % 100;
      return `$${dollars.toLocaleString()}.${remaining.toString().padStart(2, '0')}`;
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function sanitizeUrl(url) {
      if (!url) return null;
      try {
        const u = new URL(url.startsWith('http') ? url : 'https://' + url);
        if (u.protocol === 'https:' || u.protocol === 'http:') return u.href;
      } catch (e) {}
      return null;
    }

    function render(data) {
      const root = document.getElementById('root');

      if (!data) {
        document.title = 'KidCash Wishlist';
        root.innerHTML = `
          <div class="header"><div class="header-logo">KidCash</div></div>
          <div class="content">
            <div class="state-box">
              <div class="state-icon">🔍</div>
              <div class="state-title">Wishlist not found</div>
              <div class="state-desc">This link may have expired or been removed.</div>
            </div>
          </div>`;
        return;
      }

      const { kidName, items = [] } = data;
      document.title = `${kidName}'s Wishlist · KidCash`;

      const itemsHtml = items.length === 0
        ? `<div class="state-box">
             <div class="state-icon">🌟</div>
             <div class="state-title">Nothing here yet</div>
             <div class="state-desc">${escapeHtml(kidName)} hasn't added anything to their wishlist yet. Check back soon!</div>
           </div>`
        : `<div class="items-list">
             ${items.map(item => {
               const productUrl = sanitizeUrl(item.url);
               const imgHtml = item.image
                 ? `<img class="item-image" src="${escapeHtml(item.image)}" alt="" onerror="this.outerHTML='<div class=\\'item-image-placeholder\\'>🎁</div>'">`
                 : `<div class="item-image-placeholder">🎁</div>`;
               const linkHtml = productUrl
                 ? `<a class="item-link" href="${escapeHtml(productUrl)}" target="_blank" rel="noopener noreferrer">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                      View product
                    </a>`
                 : '';
               return `
                 <div class="item-card">
                   ${imgHtml}
                   <div class="item-info">
                     <div class="item-name">${escapeHtml(item.name)}</div>
                     <div class="item-price">${formatMoney(item.price)}</div>
                     ${linkHtml}
                   </div>
                 </div>`;
             }).join('')}
           </div>`;

      root.innerHTML = `
        <div class="header">
          <div class="header-logo">KidCash</div>
          <div class="header-avatar">⭐</div>
          <div class="header-name">${escapeHtml(kidName)}'s Wishlist</div>
          <div class="header-tagline">Here's what ${escapeHtml(kidName)} is hoping for</div>
        </div>
        <div class="content">
          ${itemsHtml}
          <div class="footer">Powered by <a href="${escapeHtml(window.location.origin)}">KidCash</a></div>
        </div>`;
    }

    async function main() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id || !/^[0-9a-f]{32}$/.test(id)) {
        render(null);
        return;
      }

      try {
        const snap = await getDoc(doc(db, 'public_wishlists', id));
        render(snap.exists() ? snap.data() : null);
      } catch (e) {
        console.error('Failed to load wishlist:', e);
        render(null);
      }
    }

    main();
  </script>
</body>
</html>
